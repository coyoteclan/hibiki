name: CI

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libdbus-1-dev libasound2-dev libudev-dev libxkbcommon-dev libjack-dev pkg-config meson ninja-build git libwayland-dev wayland-protocols libgirepository1.0-dev valac

      - name: Build and install gtk4-layer-shell
        run: |
          git clone https://github.com/wmww/gtk4-layer-shell
          cd gtk4-layer-shell
          meson setup build
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig

      - name: Check
        run: cargo check --verbose

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Format
        run: cargo fmt --all -- --check

  build:
    name: Build Artifacts
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            artifact_name: keystroke-linux-x86_64
            bin_name: keystroke
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact_name: keystroke-linux-aarch64
            bin_name: keystroke

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libdbus-1-dev libasound2-dev libudev-dev libxkbcommon-dev libjack-dev pkg-config meson ninja-build git libwayland-dev wayland-protocols libgirepository1.0-dev valac

      - name: Build and install gtk4-layer-shell
        run: |
          git clone https://github.com/wmww/gtk4-layer-shell
          cd gtk4-layer-shell
          meson setup build
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Test
        run: cargo test --release --target ${{ matrix.target }} --verbose

      - name: Prepare Artifact
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.bin_name }} staging/${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: staging/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: keystroke-*
          merge-multiple: true

      - name: List artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: true
          generate_release_notes: true
